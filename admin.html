<!DOCTYPE html>
<html>
<head>
  <title>Admin - La Tienda De Tacos</title>
</head>
<body>

<h2>Panel Admin</h2>
<button onclick="login()">Iniciar sesión con Google</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup } 
  from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "menu-admin-tdt.firebaseapp.com",
    projectId: "menu-admin-tdt",
    storageBucket: "menu-admin-tdt.appspot.com",
    messagingSenderId: "259066574096",
    appId: "1:259066574096:web:3946944ce5c02c9aec6195"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  window.login = function() {
    signInWithPopup(auth, provider)
    .then((result) => {
      alert("Bienvenido Admin");
    })
    .catch((error) => {
      alert("Error");
    });
  }
</script>

</body>
</html>
