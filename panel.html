<!DOCTYPE html>
<html>
<head>
<title>Panel Admin</title>
<style>
body{
  font-family: Arial;
  background:#f5f5f5;
  padding:20px;
}

input{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:10px 20px;
  background:#ff6600;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.card{
  background:white;
  border-radius:12px;
  padding:10px;
  margin:10px;
  width:200px;
  display:inline-block;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  border-radius:10px;
}

.card h3{
  margin:5px 0;
}

</style>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<h2>Agregar Producto</h2>

<input id="nombre" placeholder="Nombre">
<input id="precio" placeholder="Precio">
<input type="file" id="imagen" accept="image/*">
<button onclick="guardar()">Guardar</button>
<div id="lista"></div>
<script>

const firebaseConfig = {
  apiKey: "AIza....",
  authDomain: "menu-admin-tdt.firebaseapp.com",
  projectId: "menu-admin-tdt",
  storageBucket: "menu-admin-tdt.firebasestorage.app",
  messagingSenderId: "...",
  appId: "..."
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function guardar(){

let archivo = document.getElementById("imagen").files[0];

let storageRef = firebase.storage().ref("productos/" + archivo.files[0].name);

storageRef.put(archivo.files[0]).then((snapshot)=>{

snapshot.ref.getDownloadURL().then((url)=>{

db.collection("productos").add({
nombre: document.getElementById("nombre").value,
precio: document.getElementById("precio").value,
imagen: url
}).then(()=>{
alert("Producto agregado");
mostrarProductos();
});

});

});

}
function mostrarProductos() {
  const contenedor = document.getElementById("lista");

  db.collection("productos").get().then((querySnapshot) => {
    contenedor.innerHTML = "";
    querySnapshot.forEach((doc) => {
      const data = doc.data();
      contenedor.innerHTML += `
        <div style="border:1px solid #ccc; padding:10px; margin:10px;">
          <img src="${data.imagen}" width="100">
          <h3>${data.nombre}</h3>
          <p>$${data.precio}</p>
        </div>
      `;
    });
  });
});
}
</script>
<div id="lista"></div>
<script>
mostrarProductos();
</script>
</body>
</html>
